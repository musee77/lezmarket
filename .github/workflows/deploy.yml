name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/lezmarket

jobs:
  # ============================================
  # Job 1: Build and Push Docker Image
  # ============================================
  build-and-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD-HHmmss'}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
            NEXT_PUBLIC_X_CLIENT_ID=${{ secrets.NEXT_PUBLIC_X_CLIENT_ID }}
            NEXT_PUBLIC_LINKEDIN_CLIENT_ID=${{ secrets.NEXT_PUBLIC_LINKEDIN_CLIENT_ID }}
            NEXT_PUBLIC_TIKTOK_CLIENT_ID=${{ secrets.NEXT_PUBLIC_TIKTOK_CLIENT_ID }}
            NEXT_PUBLIC_FACEBOOK_CLIENT_ID=${{ secrets.NEXT_PUBLIC_FACEBOOK_CLIENT_ID }}
            NEXT_PUBLIC_THREADS_CLIENT_ID=${{ secrets.NEXT_PUBLIC_THREADS_CLIENT_ID }}
            NEXT_PUBLIC_REDDIT_CLIENT_ID=${{ secrets.NEXT_PUBLIC_REDDIT_CLIENT_ID }}

      - name: Post build summary
        run: |
          echo "### 🐳 Docker Image Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKERHUB_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: Deploy to AWS EC2 (Docker Compose)
  # ============================================
  deploy:
    name: 🚀 Deploy to lezmarket.io
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code (for stack files)
        uses: actions/checkout@v4

      - name: Copy stack files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "nginx/nginx.conf"
          target: ${{ secrets.APP_DIR }}
          overwrite: true

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e

            echo "🚀 Deploying to lezmarket.io (AWS EC2 / Docker Compose)..."

            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull the latest image
            docker pull ${{ env.DOCKERHUB_IMAGE }}:latest

            # Navigate to app directory on EC2
            cd ${{ secrets.APP_DIR }}

            # Write production env file
            cat > .env.production << 'ENVEOF'
            ${{ secrets.ENV_PRODUCTION }}
            ENVEOF

            # Ensure nginx directory exists
            mkdir -p nginx

            # Write production docker-compose.yml
            cat > docker-compose.yml << 'COMPOSEEOF'
            services:
              app:
                image: ${DOCKERHUB_IMAGE}:${TAG:-latest}
                container_name: letsmarket-app
                restart: unless-stopped
                ports:
                  - "3000:3000"
                environment:
                  - NODE_ENV=production
                env_file:
                  - .env.production
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                deploy:
                  resources:
                    limits:
                      cpus: "1"
                      memory: 512M
                    reservations:
                      cpus: "0.25"
                      memory: 256M
                networks:
                  - letsmarket-network
                logging:
                  driver: "json-file"
                  options:
                    max-size: "10m"
                    max-file: "3"

            networks:
              letsmarket-network:
                driver: bridge
            COMPOSEEOF

            # Deploy with Docker Compose
            echo "📦 Deploying with Docker Compose..."
            export DOCKERHUB_IMAGE="${{ env.DOCKERHUB_IMAGE }}"
            export TAG="latest"
            docker compose up -d --pull always --remove-orphans

            # Wait for services to start
            echo "⏳ Waiting for services to start..."
            RETRIES=12
            DELAY=10
            HEALTHY=false

            for i in $(seq 1 $RETRIES); do
              sleep $DELAY
              RESPONSE=$(curl -sf http://localhost:3000/api/health 2>/dev/null || echo "")
              if echo "$RESPONSE" | grep -q "healthy"; then
                HEALTHY=true
                echo "✅ Health check passed (attempt ${i}/${RETRIES})"
                break
              else
                echo "⏳ Attempt ${i}/${RETRIES} — waiting..."
              fi
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ lezmarket.io is live and healthy!"
            else
              echo "⚠️ Health check inconclusive — checking container status..."
              docker compose ps
              docker compose logs --tail 30 app
              echo ""
              echo "⚠️ Deployment completed but health check did not pass."
              echo "   Check: curl -k https://lezmarket.io/api/health"
            fi

            # Cleanup old images
            docker image prune -f
            echo "🎉 Deployment complete!"

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "### 🚀 Deployed to lezmarket.io" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://lezmarket.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Image:** \`${{ env.DOCKERHUB_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** \`$(date -u)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 3: Post-deploy Verification
  # ============================================
  verify:
    name: ✅ Post-deploy Verification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Wait for DNS/CDN propagation
        run: sleep 30

      - name: Verify production site
        run: |
          echo "🔍 Verifying https://lezmarket.io..."

          # Check HTTPS is working
          HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' --max-time 30 https://lezmarket.io || echo "000")
          echo "HTTP Status: ${HTTP_CODE}"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Site is live!"
          elif [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Site responds with redirect (expected for some paths)"
          else
            echo "⚠️ Unexpected status code: ${HTTP_CODE}"
          fi

          # Check health endpoint
          HEALTH=$(curl -sf --max-time 10 https://lezmarket.io/api/health || echo '{"status":"unreachable"}')
          echo "Health: ${HEALTH}"

      - name: Verification summary
        run: |
          echo "### ✅ Post-deploy Verification" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://lezmarket.io" >> $GITHUB_STEP_SUMMARY
          echo "- **Verified at:** \`$(date -u)\`" >> $GITHUB_STEP_SUMMARY
